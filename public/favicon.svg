<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Modern Soft Shadow Effect -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Subtle Gradient for Green Field -->
    <radialGradient id="greenField" cx="50%" cy="50%" r="70%" fx="50%" fy="20%">
      <stop offset="0%" stop-color="#008C75" />
      <stop offset="100%" stop-color="#007D69" />
    </radialGradient>
  </defs>

  <!-- Solid Exeter Deep Green Background Field -->
  <rect width="400" height="400" rx="40" fill="url(#greenField)" />

  <!-- The Unified, Modern Symbol (Scaled Up) -->
  <!-- White (#FFFFFF) lines with soft shadow -->
  <path d="M 80 50 
           H 320 
           A 30 30 0 0 1 350 80 
           V 170 
           A 30 30 0 0 0 350 230 
           V 320 
           A 30 30 0 0 1 320 350 
           H 80 
           A 30 30 0 0 1 50 320 
           V 230 
           A 30 30 0 0 0 50 170 
           V 80 
           A 30 30 0 0 1 80 50 
           Z 
           M 145 145 
           L 200 200 
           L 145 255 
           M 255 145 
           L 200 200 
           L 255 255" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#softShadow)"/>
</svg>
